name: Xiaomi 11 ULTRA

on:
  workflow_call:
  workflow_dispatch:

env:
  # Device env
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVICE_NAME : "xiaomi_11U"
  DEVICE_CODENAME : "star"

  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : 'LD=ld.lld LLVM=1 LLVM_IAS=1 EXTRA_CFLAGS="-Wno-unused-function -Wno-frame-larger-than"'

  KERNEL_SOURCE : "https://github.com/joel27/android_kernel_xiaomi-star_sm8350.git"
  KERNEL_BRANCH : "merge-ack"

  CLANG_SOURCE: "https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "vendor/star_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  KERNELSU_SOURCE : ""
  KERNELSU_BRANCH : ""

  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "resukisu"

  SUSFS_ENABLE : true
  SUSFS_FIXED : true

  AK3_SOURCE : "https://github.com/osm0sis/Anykernel3.git"
  AK3_BRANCH : "master"

  BOOT_SOURCE : ""
  NEED_DTBO : false
  NEED_SAFE_DTBO : false
  ROM_TEXT : "KSUMulti"

  PYTHON_VERSION: "3"
  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  KERNELSU_METHOD: "shell"
  KERNELSU_SUS_PATCH: "false"

  PATCHES_SOURCE: "JackA1ltman/NonGKI_Kernel_Patches"
  PATCHES_BRANCH: "mi_kernel"

  SUSFS_FOLDER_FIXED: "mi11_evox_a16"
  SUSFS_PATCH_FIXED: "susfs_fixed"

  REKERNEL_ENABLE: "false"
  HOOK_METHOD: "syscall"
  KERNEL_PATCH: "false"

  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  KPM_KPATCH_NEXT: "false"
  KPM_PATCH_SOURCE: "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU_patch/refs/heads/main/kpm/patch_linux"

  BASEBAND_GUARD_ENABLE: "false"
  BASEBAND_GUARD_BOOT: "false"
  HIDE_STUFF: "false"

  GENERATE_DTB: "false"
  GENERATE_CHIP: "qcom"

  BUILD_DEBUGGER: "false"
  SKIP_PATCH: "false"
  BUILD_OTHER_CONFIG: "false"
  MERGE_CONFIG_FILES: "vendor/star_QGKI.config,vendor/xiaomi_QGKI.config"
  FREE_MORE_SPACE: "false"

jobs:
  build-kernel:
    name: Xiaomi11U (hyper A14)
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get neccssary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options
        run: |
          cd "$GITHUB_WORKSPACE/device_kernel"
          echo "KBUILD_BUILD_TIMESTAMP=Fri Nov 14 08:26:51 UTC 2025" >> $GITHUB_ENV

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      # 打包Anykernel3 仅Image内核专用
      - name: 📦 Package Anykernel3 Flash Zip
        if: env.PACK_METHOD == 'Anykernel3'
        shell: bash
        run: |
          set -euo pipefail
          echo "============================================="
          echo "📦 开始打包 Star Hyper A14 内核卡刷包"
          echo "============================================="
          TIME=$(date +"%Y%m%d%H%M%S")
          KERNEL_DIR="${GITHUB_WORKSPACE}/device_kernel"
          TMP_DIR="${KERNEL_DIR}/tmp"
          IMG_PATH="${KERNEL_DIR}/out/arch/arm64/boot/Image"
          cd "${KERNEL_DIR}"
          # 严格校验内核文件存在
          if [[ ! -f "${IMG_PATH}" ]]; then
            echo "::error::❌ 编译失败，未找到 out/arch/arm64/boot/Image 内核文件"
            exit 1
          fi
          IMG_SIZE=$(du -h "${IMG_PATH}" | awk '{print $1}')
          echo "✅ 检测到内核镜像 Image | 大小: ${IMG_SIZE}"
          # 清理重建临时目录
          rm -rf "${TMP_DIR}"
          mkdir -p "${TMP_DIR}"
          
          # =========================================================
          # ¡AQUÍ VA EL REEMPLAZO DEL ANYKERNEL3 CORREGIDO!
          # =========================================================
          AK3_DIR="${KERNEL_DIR}/Anykernel3"
          if [[ -d "${AK3_DIR}" ]]; then
            # 1. Primero descargamos el script base de internet
            curl -L https://raw.githubusercontent.com/joel27/TechMaster-nGKI_Kernel_Build/main/Patches/anykernel.sh -o Anykernel3/anykernel.sh
            chmod +x Anykernel3/anykernel.sh
            
            # 2. Luego aplicamos las modificaciones sobre el archivo descargado
            sed -i \
              -e 's/^name=.*/name="Kernel-ReSukiSU-11U"/' \
              -e 's/^do\.devicecheck=.*/do.devicecheck=0/' \
              -e 's/^IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=1/' \
              -e 's/^BLOCK=.*/BLOCK=boot/' \
              "${AK3_DIR}/anykernel.sh"
          fi
          # =========================================================

          # 复制内核主镜像
          cp -v "${IMG_PATH}" "${TMP_DIR}/Image"
          # 按需打包内核模块
          if [[ "${{ env.PACK_KMODULES }}" == "true" ]]; then
            MOD_DIR="${TMP_DIR}/modules/vendor/lib/modules"
            mkdir -p "${MOD_DIR}"
            find . -name "*.ko" -type f -print0 | xargs -0 cp -t "${MOD_DIR}/" 2>/dev/null || true
            module_count=$(find "${MOD_DIR}" -name "*.ko" | wc -l)
            echo "📦 打包内核模块: ${module_count} 个"
            [[ ${module_count} -eq 0 ]] && rm -rf "${TMP_DIR}/modules"
          else
            echo "ℹ️ 已关闭模块打包，跳过ko文件"
          fi
          # 合并Anykernel3刷机脚本全部文件
          [[ -d "${AK3_DIR}" ]] && cp -rp "${AK3_DIR}"/* "${TMP_DIR}/"
          # 最高压缩率打包ZIP
          cd "${TMP_DIR}"
          7za a -tzip -mx9 -mmt=on package.zip ./* >/dev/null
          cd "${GITHUB_WORKSPACE}"
          
          # =========================================================
          # ¡AQUÍ TAMBIÉN APROVECHAMOS PARA DEJAR EL NOMBRE FIJO DE TU ZIP!
          # =========================================================
          FINAL_ZIP="Star-Kernel-ReSukiSU-TechMaster.zip"
          cp -fp "${TMP_DIR}/package.zip" "${FINAL_ZIP}"
          echo "PACK_NAME=${FINAL_ZIP}" >> "${GITHUB_ENV}"
          echo "✅ Zip generado: ${FINAL_ZIP}"
          rm -rf "${TMP_DIR}"
      # Subir el ZIP directamente a la pestaña de Actions (Artifacts)
      - name: 🚀 Upload Artifact to Actions
        uses: actions/upload-artifact@v4
        if: env.PACK_METHOD == 'Anykernel3'
        with:
          name: ${{ env.DEVICE_CODENAME }}-${{ env.ROM_TEXT }}-Kernel
          path: ${{ env.PACK_NAME }}
          compression-level: 0
