name: Xiaomi Mi Pad 4 (LineageOS 22) [clover] ReSukiSU

on:
  workflow_call:
  workflow_dispatch:

env:
  DEVICE_NAME : "MiPad4"
  DEVICE_CODENAME : "clover"

  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : "LD=ld.lld LLVM=1 LLVM_IAS=1"

  KERNEL_SOURCE : "https://github.com/pix106/android_kernel_xiaomi_southwest-4.19.git"
  KERNEL_BRANCH : "main"

  CLANG_SOURCE : "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/LLVM-19.1.7-Linux-X64.tar.xz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "clover_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  KERNELSU_SOURCE : "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh"
  KERNELSU_BRANCH : "susfs-main"
  KERNELSU_NAME : "SukiSU"

  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "sukisu"        # 根据示例，resukisu 是有效值
  KERNELSU_METHOD: "shell"

  SUSFS_ENABLE : true
  SUSFS_FIXED : true

  PATCHES_SOURCE: "PeterTea5822/NonGKI_Kernel_Patches"
  PATCHES_BRANCH: "main"
  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""

  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"
  BOOT_SOURCE : ""

  NEED_DTBO : false
  NEED_SAFE_DTBO : false

  ROM_TEXT : "lineageos_a15"

  PYTHON_VERSION: "3"
  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  REKERNEL_ENABLE: "false"
  HOOK_METHOD: "syscall"                 # 保持示例默认值
  KERNEL_PATCH: "true"                   # 4.19 内核需要这个
  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  KPM_KPATCH_NEXT: "false"
  KPM_PATCH_SOURCE: ""

  BASEBAND_GUARD_ENABLE: "false"
  BASEBAND_GUARD_BOOT: "false"

  HIDE_STUFF: "false"
  GENERATE_DTB: "false"
  BUILD_DEBUGGER: "false"
  SKIP_PATCH: "false"
  BUILD_OTHER_CONFIG: "false"
  FREE_MORE_SPACE: "false"

jobs:
  build-kernel:
    name: Xiaomi Mi Pad 4 (LineageOS 22) [clover] ReSukiSU
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get necessary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options
        run: |
          cd $GITHUB_WORKSPACE/device_kernel

          # 如果 setup.sh 未自动移动源码，则兜底处理
          if [ -d "KernelSU" ] && [ ! -d "drivers/kernelsu" ]; then
            mv KernelSU/kernel drivers/kernelsu
            rm -rf KernelSU
          elif [ -d "kernelsu" ] && [ ! -d "drivers/kernelsu" ]; then
            mv kernelsu/kernel drivers/kernelsu
            rm -rf kernelsu
          fi

          # 注入 Manual Hook 和 SUSFS 配置（如果 defconfig 中没有）
          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          if ! grep -q "CONFIG_KSU_MANUAL_HOOK" "$DEFCONFIG"; then
            cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_MANUAL_HOOK=y
          # CONFIG_KSU_WITH_KPROBES is not set
          EOF
          fi

          if ! grep -q "CONFIG_KSU_SUSFS" "$DEFCONFIG"; then
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
          fi

          # 重新生成 .config
          mkdir -p out
          make ARCH=arm64 O=out ${{ env.DEFCONFIG_NAME }}
          make ARCH=arm64 O=out olddefconfig

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process

      - name: ✏️ Upload Build Artifact (Absolute capture)
        uses: ./.github/workflows/upload-files
