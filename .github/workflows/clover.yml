name: Build Kernel for MiPad4 (clover)

on:
  workflow_call:
  workflow_dispatch:

env:
  # 1. 设备基础配置
  DEVICE_NAME : "MiPad4"
  DEVICE_CODENAME : "clover"

  # 2. 编译指令与内核源码
  CUSTOM_CMDS : "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS : "LD=ld.lld LLVM=1 LLVM_IAS=1"

  KERNEL_SOURCE : "https://github.com/pix106/android_kernel_xiaomi_southwest-4.19.git"
  KERNEL_BRANCH : "main"

  # 3. 工具链配置 (LLVM 19.1.7)
  CLANG_SOURCE : "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/LLVM-19.1.7-Linux-X64.tar.xz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  # 4. 编译目标文件
  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME : "clover_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  # 5. KernelSU 与 SUSFS 配置
  KERNELSU_SOURCE : "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/susfs-main/kernel/setup.sh"
  KERNELSU_BRANCH : "susfs-main"
  KERNELSU_NAME : "KernelSU"
  
  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "sukisu" 
  KERNELSU_METHOD: "shell" 

  SUSFS_ENABLE : true
  SUSFS_FIXED : true

  # 6. 补丁仓库 (Patch)
  PATCHES_SOURCE: "PeterTea5822/NonGKI_Kernel_Patches"
  PATCHES_BRANCH: "main"
  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""

  # 7. 打包配置 (AnyKernel3)
  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"
  BOOT_SOURCE : "https://github.com/boot_author/android_kernel_codename/raw/refs/heads/main/rom/source_imgs/boot.img"
  
  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"

  # 8. 其他功能开关
  PYTHON_VERSION: "3"
  ROM_TEXT : "lineageos_a15"
  NEED_DTBO : false
  NEED_SAFE_DTBO : false
  REKERNEL_ENABLE: "false"
  HOOK_METHOD: "syscall"
  KERNEL_PATCH: "true" # 开启此项以修复 4.19 内核底层函数导出
  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  HIDE_STUFF: "false"
  GENERATE_DTB: "false"
  BUILD_DEBUGGER: "false"

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    
    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get neccssary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

            - name: 🪛 Extra Kernel Options
        run: |
          set -e
          cd $GITHUB_WORKSPACE/device_kernel

          # 1. 移动 KernelSU 源码
          if [ -d "KernelSU" ]; then
            rm -rf drivers/kernelsu
            mv KernelSU/kernel drivers/kernelsu
            rm -rf KernelSU
          elif [ -d "kernelsu" ]; then
            rm -rf drivers/kernelsu
            mv kernelsu/kernel drivers/kernelsu
            rm -rf kernelsu
          fi

          # 2. 注入配置到 defconfig
          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          
          # 先清掉可能重复的配置
          sed -i '/^CONFIG_KSU/d' "$DEFCONFIG"
          sed -i '/^CONFIG_SUSFS/d' "$DEFCONFIG"
          sed -i '/^CONFIG_JUMP_LABEL/d' "$DEFCONFIG"
          sed -i '/^CONFIG_LOCALVERSION_AUTO/d' "$DEFCONFIG"
          sed -i '/^CONFIG_SUKISU/d' "$DEFCONFIG"
          
          # 写入必需配置
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_HOOK_RC=y
          CONFIG_KSU_HOOK_INPUT=y
          CONFIG_KSU_HOOK_PROCESS=y
          CONFIG_KSU_HOOK_SCHED=y
          CONFIG_SUSFS=y
          CONFIG_SUSFS_HOOK_RC=y
          CONFIG_SUSFS_HOOK_INPUT=y
          CONFIG_JUMP_LABEL=y
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_SUKISU=y
          EOF

          # 3. 重新生成 .config 使配置真正生效
          mkdir -p out
          make ARCH=arm64 O=out ${{ env.DEFCONFIG_NAME }}
          make ARCH=arm64 O=out olddefconfig

          # 4. 确保 drivers/Makefile 包含 kernelsu 子目录
          grep -q "kernelsu" drivers/Makefile || echo 'obj-y += kernelsu/' >> drivers/Makefile

          # 5. 验证配置是否生效
          echo "=== 最终 .config 中的 KSU 配置 ==="
          grep -E "CONFIG_KSU|CONFIG_SUSFS|CONFIG_JUMP_LABEL" out/.config
      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process
